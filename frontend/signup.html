<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Gap Analyzer - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Skill Gap Analyzer</div>
            <div class="nav-links">
                <a href="index.html">About</a>
                <a href="login.html">Login</a>
                <a href="signup.html">Signup</a>
            </div>
        </nav>
    </header>

    <main>
        <section id="signup" class="auth-section">
            <div class="container">
                <h2>Sign Up</h2>
                <form class="auth-form">
                    <div class="form-group">
                        <label for="signup-name">Name:</label>
                        <input type="text" id="signup-name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email:</label>
                        <input type="email" id="signup-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password:</label>
                        <input type="password" id="signup-password" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm-password">Confirm Password:</label>
                        <input type="password" id="signup-confirm-password" name="confirm-password" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-user-type">I am a:</label>
                        <select id="signup-user-type" name="user_type" required>
                            <option value="candidate">Candidate</option>
                            <option value="company">Company</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Sign Up</button>
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Skill Gap Analyzer. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
